<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 80px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 60px; /* más grande */
      margin-bottom: 30px;
      filter: invert(1);
    }

    .top-menu {
      margin-bottom: 30px;
    }

    .top-menu a {
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      color: white;
    }

    .menu {
      display: flex;
      gap: 80px;
    }

    .menu a {
      font-size: 12px;
      letter-spacing: 3px;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div id="canvas-container"></div>

<div class="barra">

  <div class="firma">
    <img src="sello.png">
  </div>

  <div class="top-menu">
    <a href="#">BIO</a>
  </div>

  <div class="menu">
    <a>ART PRACTICE</a>
    <a>STUDIO</a>
    <a>XDXTXRXXL</a>
  </div>

</div>

<script>
let mode = "none";
let t = 0;

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");

  setupMenu();
}

function draw() {
  clear();
  t += 0.02;

  if (mode === "practice") drawConeLight();
  if (mode === "studio") drawDoor();
  if (mode === "xdx") drawMannequin();
}

/* ===== ART PRACTICE → LUZ CONO ===== */
function drawConeLight() {
  noStroke();
  for (let i = 0; i < 50; i++) {
    fill(255, 5);
    triangle(
      width/2, height*0.2,
      width/2 - i*10, height*0.8,
      width/2 + i*10, height*0.8
    );
  }
}

/* ===== STUDIO → PUERTA ===== */
function drawDoor() {
  let x = width/2;
  let y = height*0.6;

  stroke(255);
  noFill();
  rectMode(CENTER);

  rect(x, y, 120, 220);

  fill(255, 40);
  noStroke();
  rect(x, y, 100, 200);
}

/* ===== XDXTXRXXL → MANIQUI ===== */
function drawMannequin() {
  let cx = width/2;
  let cy = height*0.5;

  stroke(255);
  noFill();

  // cabeza
  ellipse(cx, cy - 80, 30);

  // torso
  line(cx, cy - 60, cx, cy + 40);

  // brazos
  line(cx, cy - 30, cx - 40, cy);
  line(cx, cy - 30, cx + 40, cy);

  // piernas
  line(cx, cy + 40, cx - 20, cy + 100);
  line(cx, cy + 40, cx + 20, cy + 100);

  // efecto holograma (parpadeo leve)
  stroke(255, 100 + sin(t*5)*50);
}

/* ===== INTERACCIÓN ===== */
function setupMenu() {
  let links = document.querySelectorAll(".menu a");

  links[0].onmouseover = () => mode = "practice";
  links[1].onmouseover = () => mode = "studio";
  links[2].onmouseover = () => mode = "xdx";

  links.forEach(link => {
    link.onmouseout = () => mode = "none";
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
