<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* BARRA */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 15px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 10px;
    }

    /* BIO / CONTACTO */
    .top-menu {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }

    .top-menu a {
      font-size: 10px;
      letter-spacing: 2px;
      text-decoration: none;
      color: black;
    }

    /* MENÚ PRINCIPAL */
    .menu {
      display: flex;
      gap: 50px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      text-decoration: none;
      color: black;
      cursor: pointer;
    }

    .menu a:hover {
      opacity: 0.5;
    }

    /* CANVAS */
    #canvas-container {
      position: absolute;
      top: 120px;
      left: 0;
      width: 100%;
    }
  </style>
</head>

<body>

  <!-- BARRA -->
  <div class="barra">

    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="top-menu">
      <a href="#">BIO</a>
      <a href="#">CONTACTO</a>
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>ART PRACTICE</a>
      <a>APRESTO</a>
    </div>

  </div>

  <!-- CANVAS -->
  <div id="canvas-container"></div>

  <!-- SCRIPT -->
  <script>
    let mode = "default";
    let t = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight - 120);
      canvas.parent("canvas-container");
      setupMenu();
    }

    function draw() {
      background(255);

      stroke(0);
      noFill();
      strokeWeight(1);

      t += 0.02;

      drawLandscape();

      if (mode === "shirt") drawShirtBody();
      if (mode === "dance") drawDancingBody();
      if (mode === "push") drawPushupBody();
    }

    /* ===== PAISAJE ===== */
    function drawLandscape() {
      let baseY = height * 0.7;

      // suelo
      line(0, baseY, width, baseY);

      // CASA
      drawHouse(width * 0.3, baseY);

      // TIENDA
      drawShop(width * 0.5, baseY);

      // PARQUE
      drawPark(width * 0.7, baseY);
    }

    function drawHouse(x, y) {
      rectMode(CENTER);
      rect(x, y - 30, 60, 40);

      // techo
      line(x - 30, y - 50, x, y - 80);
      line(x + 30, y - 50, x, y - 80);
    }

    function drawShop(x, y) {
      rectMode(CENTER);
      rect(x, y - 30, 70, 40);

      // vitrina
      line(x - 35, y - 10, x + 35, y - 10);
    }

    function drawPark(x, y) {
      // árbol
      line(x, y, x, y - 40);
      ellipse(x, y - 60, 40);

      // banca
      line(x - 40, y - 10, x - 10, y - 10);
      line(x - 40, y - 20, x - 10, y - 20);
    }

    /* ===== CUERPOS ===== */
    function drawShirtBody() {
      let cx = width / 2;
      let cy = height / 2;

      line(cx, cy - 40, cx, cy + 40);
      line(cx, cy - 20, cx - 40, cy);
      line(cx, cy - 20, cx + 40, cy);

      line(cx, cy + 40, cx - 20, cy + 80);
      line(cx, cy + 40, cx + 20, cy + 80);

      ellipse(cx, cy - 60, 20);

      rectMode(CENTER);
      rect(cx, cy - 10, 60, 50);
    }

    function drawDancingBody() {
      let cx = width / 2;
      let cy = height / 2;

      let m = sin(t * 2) * 20;

      line(cx, cy - 40, cx + m, cy + 40);
      ellipse(cx, cy - 60, 20);

      line(cx, cy - 20, cx - 40, cy + m);
      line(cx, cy - 20, cx + 40, cy - m);

      line(cx + m, cy + 40, cx - 20, cy + 80);
      line(cx + m, cy + 40, cx + 20, cy + 80);
    }

    function drawPushupBody() {
      let cx = width / 2;
      let cy = height / 2;

      let m = sin(t * 2) * 10;

      line(cx - 60, cy + m, cx + 60, cy - m);
      ellipse(cx + 70, cy - m, 15);

      line(cx + 40, cy, cx + 40, cy + 30 + m);
      line(cx - 60, cy, cx - 80, cy + 30);
    }

    /* ===== INTERACCIÓN ===== */
    function setupMenu() {
      let links = document.querySelectorAll(".menu a");

      links[0].onmouseover = () => mode = "shirt";
      links[1].onmouseover = () => mode = "dance";
      links[2].onmouseover = () => mode = "push";

      links.forEach(link => {
        link.onmouseout = () => mode = "default";
      });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight - 120);
    }
  </script>

</body>
</html>
