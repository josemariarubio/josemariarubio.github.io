<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 80px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 60px;
      margin-bottom: 30px;
      filter: invert(1);
    }

    .top-menu {
      margin-bottom: 30px;
    }

    .top-menu a {
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      color: white;
    }

    .menu {
      display: flex;
      gap: 120px;
    }

    .menu a {
      font-size: 12px;
      letter-spacing: 3px;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div id="canvas-container"></div>

<div class="barra">

  <div class="firma">
    <img src="sello.png">
  </div>

  <div class="top-menu">
    <a href="#">BIO</a>
  </div>

  <div class="menu">
    <a>ART PRACTICE</a>
    <a>XDXTXRXXL</a>
  </div>

</div>

<script>
let mode = "none";
let t = 0;

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");

  setupMenu();
}

function draw() {
  clear();
  t += 0.02;

  // izquierda → ART PRACTICE
  if (mode === "practice") drawConeLight(width * 0.3);

  // derecha → XDXTXRXXL
  if (mode === "xdx") drawMannequin(width * 0.7);
}

/* ===== LUZ CONO ===== */
function drawConeLight(x) {
  noStroke();

  for (let i = 0; i < 50; i++) {
    fill(255, 5);
    triangle(
      x, height * 0.2,
      x - i * 10, height * 0.8,
      x + i * 10, height * 0.8
    );
  }
}

/* ===== MANIQUI ===== */
function drawMannequin(x) {
  let cy = height * 0.5;

  stroke(255, 100 + sin(t*5)*50);
  noFill();

  ellipse(x, cy - 80, 30);

  line(x, cy - 60, x, cy + 40);

  line(x, cy - 30, x - 40, cy);
  line(x, cy - 30, x + 40, cy);

  line(x, cy + 40, x - 20, cy + 100);
  line(x, cy + 40, x + 20, cy + 100);
}

/* ===== INTERACCIÓN ===== */
function setupMenu() {
  let links = document.querySelectorAll(".menu a");

  links[0].onmouseover = () => mode = "practice";
  links[1].onmouseover = () => mode = "xdx";

  links.forEach(link => {
    link.onmouseout = () => mode = "none";
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
