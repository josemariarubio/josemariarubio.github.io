<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <style>
    body {
      margin: 0;
      background: white;
      height: 200vh; /* solo para probar scroll */
    }

    /* CONTENEDOR FIJO ARRIBA */
    .firma {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 0;
      background: white;
      z-index: 1000;
    }

    /* IMAGEN PEQUEÑA */
    .firma img {
      height: 40px; /* ajusta esto */
      width: auto;
    }
  </style>
</head>

<body>

  <div class="firma">
    <img src="sello.png" alt="firma">
  </div>

</body>
</html>
