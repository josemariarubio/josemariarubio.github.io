<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .barra-top {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      justify-content: center;
    }

    .menu {
      display: flex;
      gap: 80px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .barra-bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bottom-menu {
      display: flex;
      gap: 30px;
      margin-bottom: 15px;
    }

    .bottom-menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
    }

    .firma-bottom img {
      height: 40px;
      filter: invert(1);
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="barra-top">
  <div class="menu">
    <a>ORACLE</a>
    <a>ART PRACTICE</a>
    <a>XDXTXRXXL</a>
  </div>
</div>

<div class="barra-bottom">
  <div class="bottom-menu">
    <a>BIO</a>
    <a>CONTACT</a>
  </div>
  <div class="firma-bottom">
    <img src="sello.png">
  </div>
</div>

</body>
</html>
