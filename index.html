<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* CANVAS */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* CONTENIDO */
    .barra {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 25px;
      filter: invert(1);
    }

    .top-menu {
      display: flex;
      gap: 25px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .top-menu a {
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      color: white;
    }

    .menu {
      display: flex;
      gap: 60px;
    }

    .menu a {
      font-size: 11px;
      letter-spacing: 3px;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div id="canvas-container"></div>

  <div class="barra">
    <div class="firma">
      <img src="sello.png">
    </div>

    <div class="top-menu">
      <a href="#">BIO</a>
      <a href="#">CONTACTO</a>
      <a href="#">IG</a>
      <a href="#">YOUTUBE</a>
      <a href="#">CORREO</a>
      <a href="#">WHATSAPP</a>
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>ART PRACTICE</a>
      <a>APRESTO</a>
    </div>
  </div>

  <script>
    let mode = "none";
    let t = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent("canvas-container");

      setupMenu();
    }

    function draw() {
      clear();
      t += 0.01;

      drawLiquid();
      drawDoor();
    }

    /* ===== EFECTO AGUA ===== */
    function drawLiquid() {
      stroke(255, 20);
      noFill();

      for (let y = 0; y < height; y += 20) {
        beginShape();
        for (let x = 0; x < width; x += 20) {
          let offset = sin(x * 0.01 + t) * 10 + cos(y * 0.01 + t) * 10;
          vertex(x, y + offset);
        }
        endShape();
      }
    }

    /* ===== PUERTA ===== */
    function drawDoor() {
      if (mode === "none") return;

      let cx = width / 2;
      let cy = height / 2;

      stroke(255);
      noFill();
      rectMode(CENTER);

      rect(cx, cy, 120, 220);

      fill(255, 50);
      noStroke();
      rect(cx, cy, 100, 200);
    }

    function setupMenu() {
      let links = document.querySelectorAll(".menu a");

      links[0].onmouseover = () => mode = "a";
      links[1].onmouseover = () => mode = "b";
      links[2].onmouseover = () => mode = "c";

      links.forEach(link => {
        link.onmouseout = () => mode = "none";
      });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>

</body>
</html>
