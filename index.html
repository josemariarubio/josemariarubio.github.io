<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>José María Rubio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    /* ---------- Bloque de navegación (persiste en toda la navegación) ---------- */
    .nav-block {
      position: fixed;
      top: clamp(20px, 3vw, 40px);
      left: clamp(20px, 3vw, 40px);
      z-index: 50;
      max-width: clamp(220px, 20vw, 280px);
    }

    .icono-logo {
      width: clamp(50px, 5vw, 65px);
      margin-bottom: clamp(20px, 3vw, 30px);
      display: block;
    }

    .nombre {
      font-weight: bold;
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: 0.5px;
      line-height: 1.4;
      margin-bottom: clamp(20px, 3vw, 30px);
    }

    .menu-vertical {
      display: flex;
      flex-direction: column;
    }

    .menu-item {
      margin-bottom: clamp(6px, 0.8vw, 10px);
    }

    .menu-top {
      display: block;
      font-weight: bold;
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 1px;
      color: black;
      text-decoration: none;
      cursor: pointer;
      text-transform: uppercase;
    }

    .menu-top:hover {
      opacity: 0.5;
    }

    .submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .menu-item:hover .submenu {
      max-height: 100px;
    }

    .submenu a {
      display: block;
      font-weight: normal;
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 1px;
      color: black;
      text-decoration: none;
      text-transform: uppercase;
      padding-top: 4px;
    }

    .submenu a:hover {
      opacity: 0.5;
    }

    /* ---------- Contenido: imagen + sello, en flujo normal, fondo blanco ---------- */
    .contenido {
      margin-left: clamp(260px, 24vw, 340px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(30px, 5vw, 60px) clamp(20px, 4vw, 60px);
    }

    .imagen-obra {
      position: relative;
      width: 100%;
      max-width: 1250px;
    }

    .imagen-obra img {
      width: 100%;
      display: block;
    }

    .en-montaje {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-8deg);
      color: #fff;
      font-family: 'Neonderthaw', cursive;
      font-size: clamp(60px, 9vw, 130px);
      letter-spacing: 2px;
      white-space: nowrap;
      animation: neon-titilar 3s infinite;
    }

    @keyframes neon-titilar {
      0%, 100% {
        opacity: 1;
        text-shadow:
          0 0 5px #fff,
          0 0 12px #fff,
          0 0 22px #ff9de2,
          0 0 45px #ff9de2,
          0 0 80px #ff53c7;
      }
      3% { opacity: 0.3; text-shadow: none; }
      6% {
        opacity: 1;
        text-shadow:
          0 0 5px #fff,
          0 0 12px #fff,
          0 0 22px #ff9de2,
          0 0 45px #ff9de2,
          0 0 80px #ff53c7;
      }
      7% { opacity: 0.2; text-shadow: none; }
      9% {
        opacity: 1;
        text-shadow:
          0 0 5px #fff,
          0 0 12px #fff,
          0 0 22px #ff9de2,
          0 0 45px #ff9de2,
          0 0 80px #ff53c7;
      }
      60% {
        opacity: 1;
        text-shadow:
          0 0 5px #fff,
          0 0 12px #fff,
          0 0 22px #ff9de2,
          0 0 45px #ff9de2,
          0 0 80px #ff53c7;
      }
      62% { opacity: 0.15; text-shadow: none; }
      64% {
        opacity: 1;
        text-shadow:
          0 0 5px #fff,
          0 0 12px #fff,
          0 0 22px #ff9de2,
          0 0 45px #ff9de2,
          0 0 80px #ff53c7;
      }
    }

    .sello {
      margin-top: clamp(20px, 4vw, 40px);
    }

    .sello img {
      width: clamp(40px, 4vw, 55px);
    }
  </style>
</head>
<body>

<div class="nav-block">
  <a href="index.html">
    <img src="triangulo.png" class="icono-logo">
  </a>
  <div class="nombre">
    <div>JOSÉ MARÍA RV</div>
    <div>ARTISTA VISUAL</div>
  </div>
  <nav class="menu-vertical">
    <div class="menu-item">
      <span class="menu-top">ARTE</span>
      <div class="submenu">
        <a href="comisiones.html">COMISIONES</a>
        <a href="proyectos.html">PROYECTOS</a>
      </div>
    </div>
    <div class="menu-item">
      <span class="menu-top">SALÓN</span>
      <div class="submenu">
        <a href="notas-de-dibujo.html">NOTAS DE DIBUJO</a>
        <a href="resenas.html">RESEÑAS</a>
      </div>
    </div>
    <div class="menu-item">
      <a class="menu-top" href="proyectos-anteriores.html">PROYECTOS ANTERIORES</a>
    </div>
    <div class="menu-item">
      <a class="menu-top" href="bio.html">BIO</a>
    </div>
    <div class="menu-item">
      <a class="menu-top" href="contacto.html">CONTACTO</a>
    </div>
  </nav>
</div>

<div class="contenido">
  <div class="imagen-obra">
    <img src="quebrada.png" alt="">
    <div class="en-montaje">En montaje</div>
  </div>
  <div class="sello">
    <a href="index.html">
      <img src="sello.png">
    </a>
  </div>
</div>

</body>
</html>
