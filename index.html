<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* BARRA */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 8px;
    }

    .menu {
      display: flex;
      gap: 40px;
    }

    .menu a {
      text-decoration: none;
      color: black;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .menu a:hover {
      opacity: 0.5;
    }

    #canvas-container {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="barra">
    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="menu">
      <a href="#">XDXTXRXXL</a>
      <a href="#">LABORATORY</a>
      <a href="#">APRESTO</a>
      <a href="#">ARCHIVE</a>
    </div>
  </div>

  <div id="canvas-container"></div>

  <script>
    let offset = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight - 80);
      canvas.parent("canvas-container");
    }

    function draw() {
      background(255);

      stroke(0);
      noFill();
      strokeWeight(1);

      offset += 0.01;

      drawLine(0.01, 40, offset);
      drawLine(0.02, 60, offset + 2);
      drawLine(0.03, 80, offset + 4);
    }

    function drawLine(scale, amplitude, t) {
      beginShape();
      for (let x = 0; x < width; x += 10) {
        let y = height / 2 + sin(x * scale + t) * amplitude;
        vertex(x, y);
      }
      endShape();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight - 80);
    }
  </script>

</body>
</html>
