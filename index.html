<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <style>
    body {
      margin: 0;
      background: white;
      height: 200vh; /* para probar scroll */
      padding-top: 80px; /* evita que el contenido quede debajo de la barra */
      font-family: Arial, sans-serif;
    }

    /* BARRA SUPERIOR */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* FIRMA */
    .firma img {
      height: 30px;
      margin-bottom: 8px;
    }

    /* MENÚ */
    .menu {
      display: flex;
      gap: 40px;
    }

    .menu a {
      text-decoration: none;
      color: black;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .menu a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="barra">
    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="menu">
      <a href="#">XDXTXRXXL</a>
      <a href="#">LABORATORY</a>
      <a href="#">APRESTO</a>
      <a href="#">ARCHIVE</a>
    </div>
  </div>

</body>
</html>
