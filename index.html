<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra-top {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .menu {
      display: flex;
      gap: 80px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .barra-bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .bottom-menu {
      display: flex;
      gap: 30px;
      margin-bottom: 15px;
    }

    .bottom-menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
    }

    .firma-bottom img {
      height: 40px;
      filter: invert(1);
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div id="canvas-container"></div>

<!-- SUPERIOR -->
<div class="barra-top">
  <div class="menu">
    <a>ORACLE</a>
    <a>ART</a>
    <a>XDXTXRXXL</a>
  </div>
</div>

<!-- INFERIOR -->
<div class="barra-bottom">
  <div class="bottom-menu">
    <a>BIO</a>
    <a>CONTACT</a>
  </div>
  <div class="firma-bottom">
    <img src="sello.png">
  </div>
</div>

<script>
let mode = "none";
let flash = 0;
let light = 0;
let distort = 0;

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");

  setupMenu();
}

function draw() {
  clear();

  // 🔁 CAMBIO AQUÍ
  flash = lerp(flash, mode === "art" ? 1 : 0, 0.1);
  light = lerp(light, mode === "xdx" ? 1 : 0, 0.1);
  distort = lerp(distort, mode === "oracle" ? 1 : 0, 0.1);

  drawFlash();
  drawLight();
  drawDistortion();
}

/* FLASH */
function drawFlash() {
  if (flash < 0.01) return;

  noStroke();
  fill(255, 200 * flash);
  rect(0, 0, width, height);
}

/* LUZ */
function drawLight() {
  if (light < 0.01) return;

  noStroke();

  for (let i = 0; i < 60; i++) {
    fill(255, 4 * light);
    triangle(
      width / 2, 0,
      width / 2 - i * 15, height,
      width / 2 + i * 15, height
    );
  }
}

/* ORACLE */
function drawDistortion() {
  if (distort < 0.01) return;

  stroke(255, 40 * distort);
  noFill();

  for (let y = 0; y < height; y += 20) {
    beginShape();
    for (let x = 0; x < width; x += 20) {
      let offset = sin(x * 0.05 + frameCount * 0.1) * 10 * distort;
      vertex(x, y + offset);
    }
    endShape();
  }
}

function setupMenu() {
  let links = document.querySelectorAll(".menu a");

  links[0].onmouseover = () => mode = "oracle";
  links[1].onmouseover = () => mode = "art";
  links[2].onmouseover = () => mode = "xdx";

  links.forEach(link => {
    link.onmouseout = () => mode = "none";
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
