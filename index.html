<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 con WEBGL -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 25px;
      filter: invert(1);
    }

    .top-menu {
      display: flex;
      gap: 25px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .top-menu a {
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      color: white;
    }

    .menu {
      display: flex;
      gap: 60px;
    }

    .menu a {
      font-size: 11px;
      letter-spacing: 3px;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div id="canvas-container"></div>

  <div class="barra">
    <div class="firma">
      <img src="sello.png">
    </div>

    <div class="top-menu">
      <a href="#">BIO</a>
      <a href="#">CONTACTO</a>
      <a href="#">IG</a>
      <a href="#">YOUTUBE</a>
      <a href="#">CORREO</a>
      <a href="#">WHATSAPP</a>
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>ART PRACTICE</a>
      <a>APRESTO</a>
    </div>
  </div>

  <script>
    let t = 0;
    let mode = "none";

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight, WEBGL);
      canvas.parent("canvas-container");

      noStroke();
      setupMenu();
    }

    function draw() {
      t += 0.01;

      shaderEffect();
      drawDoor();
    }

    /* ===== LIQUIDO REALISTA ===== */
    function shaderEffect() {
      resetMatrix();
      translate(-width/2, -height/2);

      loadPixels();

      for (let x = 0; x < width; x += 4) {
        for (let y = 0; y < height; y += 4) {

          let nx = x + sin(y * 0.02 + t) * 10;
          let ny = y + cos(x * 0.02 + t) * 10;

          let c = color(0);
          set(x, y, c);
        }
      }

      updatePixels();
    }

    /* ===== PUERTA ===== */
    function drawDoor() {
      if (mode === "none") return;

      resetMatrix();
      translate(0, 0);

      stroke(255);
      noFill();
      rectMode(CENTER);

      rect(width/2, height/2, 120, 220);

      fill(255, 60);
      noStroke();
      rect(width/2, height/2, 100, 200);
    }

    function setupMenu() {
      let links = document.querySelectorAll(".menu a");

      links[0].onmouseover = () => mode = "a";
      links[1].onmouseover = () => mode = "b";
      links[2].onmouseover = () => mode = "c";

      links.forEach(link => {
        link.onmouseout = () => mode = "none";
      });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>

</body>
</html>
