<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: white;
    }

    /* BARRA SUPERIOR */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 8px;
    }

    .menu {
      display: flex;
      gap: 40px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      text-decoration: none;
      color: black;
    }

    .menu a:hover {
      opacity: 0.5;
    }

    #canvas-container {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
    }
  </style>
</head>

<body>

  <!-- BARRA -->
  <div class="barra">
    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>LABORATORY</a>
      <a>APRESTO</a>
      <a>ARCHIVE</a>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-container"></div>

  <!-- SCRIPT -->
  <script>
    let camX = 0;
    let camY = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight - 80);
      canvas.parent("canvas-container");
    }

    function draw() {
      background(230, 255, 230); // verde tipo pasto

      // cámara con mouse
      camX = lerp(camX, mouseX - width / 2, 0.05);
      camY = lerp(camY, mouseY - height / 2, 0.05);

      push();
      translate(-camX, -camY);

      drawField();

      // estructuras
      drawDome(width/2 - 300, height/2);
      drawShop(width/2 + 300, height/2);
      drawDojo(width/2, height/2 + 300);
      drawObservatory(width/2, height/2 - 300);

      pop();
    }

    /* CAMPO */
    function drawField() {
      stroke(0, 40);
      for (let i = 0; i < 200; i++) {
        let x = random(width * 2) - width;
        let y = random(height * 2) - height;
        line(x, y, x, y + 10);
      }
    }

    /* DOMO */
    function drawDome(x, y) {
      push();
      translate(x, y);
      noFill();
      stroke(0);

      arc(0, 0, 150, 150, PI, TWO_PI);
      line(-75, 0, 75, 0);

      pop();
    }

    /* VITRINA */
    function drawShop(x, y) {
      push();
      translate(x, y);
      rectMode(CENTER);

      rect(0, 0, 120, 80);
      line(-60, -20, 60, -20);

      pop();
    }

    /* DOJO */
    function drawDojo(x, y) {
      push();
      translate(x, y);

      rectMode(CENTER);
      rect(0, 0, 140, 80);

      line(-80, -40, 0, -80);
      line(80, -40, 0, -80);

      pop();
    }

    /* OBSERVATORIO */
    function drawObservatory(x, y) {
      push();
      translate(x, y);

      ellipse(0, 0, 120);
      line(0, 0, 60, -60);

      pop();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight - 80);
    }
  </script>

</body>
</html>
