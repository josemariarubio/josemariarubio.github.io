<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>José María Rubio</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }
    .barra-top {
      position: fixed;
      top: 0;
      width: 100%;
      padding: clamp(15px, 4vw, 30px) 0;
      display: flex;
      justify-content: center;
      background: black;
      z-index: 100;
      box-sizing: border-box;
    }
    .menu {
      display: flex;
      gap: clamp(20px, 8vw, 80px);
    }
    .menu a {
      font-size: clamp(8px, 2.2vw, 10px);
      letter-spacing: clamp(1px, 0.3vw, 2px);
      color: white;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .barra-bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: clamp(15px, 4vw, 30px) 0;
      display: flex;
      justify-content: center;
      background: black;
      z-index: 100;
      box-sizing: border-box;
    }
    .firma-bottom img {
      height: clamp(24px, 6vw, 40px);
      filter: invert(1);
    }
    a:hover {
      opacity: 0.5;
    }
    .lang-toggle {
      position: fixed;
      top: clamp(15px, 4vw, 30px);
      right: clamp(15px, 4vw, 30px);
      font-size: clamp(8px, 2.2vw, 10px);
      letter-spacing: clamp(1px, 0.3vw, 2px);
      color: white;
      background: none;
      border: none;
      cursor: pointer;
      font-family: Arial, sans-serif;
      opacity: 0.6;
      z-index: 100;
    }
    .lang-toggle:hover {
      opacity: 1;
    }
    .contenido {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .triangulo {
      width: clamp(120px, 25vw, 280px);
      animation: titilar 4s infinite;
    }
    @keyframes titilar {
      0%   { opacity: 1; }
      2%   { opacity: 0.2; }
      4%   { opacity: 1; }
      6%   { opacity: 0.3; }
      8%   { opacity: 1; }
      50%  { opacity: 1; }
      52%  { opacity: 0.15; }
      54%  { opacity: 1; }
      70%  { opacity: 1; }
      72%  { opacity: 0.4; }
      74%  { opacity: 1; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<button class="lang-toggle" id="langToggle">EN</button>

<div class="barra-top">
  <div class="menu">
    <a href="estudio.html" data-es="ESTUDIO" data-en="STUDIO">ESTUDIO</a>
    <a href="bio-contacto.html" data-es="BIO/CONTACTO" data-en="BIO/CONTACT">BIO/CONTACTO</a>
    <a href="portafolio.html" data-es="PORTAFOLIO" data-en="PORTFOLIO">PORTAFOLIO</a>
  </div>
</div>

<div class="contenido">
  <img src="triangulo.png" class="triangulo" alt="">
</div>

<div class="barra-bottom">
  <a href="index.html" class="firma-bottom">
    <img src="sello.png">
  </a>
</div>

<script>
  const menuLinks = document.querySelectorAll('.menu a');
  const toggleBtn = document.getElementById('langToggle');

  function setLang(lang) {
    menuLinks.forEach(link => {
      link.textContent = link.getAttribute('data-' + lang);
    });
    toggleBtn.textContent = lang === 'es' ? 'EN' : 'ES';
    document.documentElement.lang = lang;
    localStorage.setItem('siteLang', lang);
  }

  const saved = localStorage.getItem('siteLang');
  const browserLang = navigator.language || navigator.userLanguage;
  const initialLang = saved || (browserLang.startsWith('es') ? 'es' : 'en');

  setLang(initialLang);

  toggleBtn.addEventListener('click', () => {
    const current = document.documentElement.lang;
    setLang(current === 'es' ? 'en' : 'es');
  });
</script>

</body>
</html>
