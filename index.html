<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>José María Rubio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: Arial, sans-serif;
    }

    /* ---------- Bloque de navegación (persiste en toda la navegación) ---------- */
    .nav-block {
      position: fixed;
      top: clamp(20px, 3vw, 40px);
      left: clamp(20px, 3vw, 40px);
      z-index: 50;
      max-width: clamp(220px, 20vw, 280px);
    }

    .icono-logo {
      width: clamp(50px, 5vw, 65px);
      margin-bottom: clamp(20px, 3vw, 30px);
      display: block;
    }

    .nombre {
      font-weight: bold;
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: 0.5px;
      line-height: 1.4;
      margin-bottom: clamp(20px, 3vw, 30px);
    }

    .menu-vertical {
      display: flex;
      flex-direction: column;
    }

    .menu-item {
      margin-bottom: clamp(14px, 2vw, 22px);
    }

    .menu-top {
      display: block;
      font-weight: bold;
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 1px;
      color: black;
      text-decoration: none;
      cursor: pointer;
      text-transform: uppercase;
    }

    .menu-top:hover {
      opacity: 0.5;
    }

    .submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .menu-item:hover .submenu {
      max-height: 100px;
    }

    .submenu a {
      display: block;
      font-weight: normal;
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 1px;
      color: black;
      text-decoration: none;
      text-transform: uppercase;
      padding-top: 4px;
    }

    .submenu a:hover {
      opacity: 0.5;
    }

    /* ---------- Sello fijo, centrado abajo, persiste en toda la navegación ---------- */
    .sello-fijo {
      position: fixed;
      bottom: clamp(15px, 2vw, 25px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .sello-fijo img {
      width: clamp(40px, 4vw, 55px);
    }

    /* ---------- Botón de idioma ---------- */
    .lang-toggle {
      position: fixed;
      top: clamp(15px, 2vw, 25px);
      right: clamp(15px, 2vw, 25px);
      font-size: clamp(9px, 1vw, 10px);
      letter-spacing: 2px;
      color: black;
      background: none;
      border: none;
      cursor: pointer;
      font-family: Arial, sans-serif;
      opacity: 0.6;
      z-index: 100;
    }
    .lang-toggle:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

<button class="lang-toggle" id="langToggle">EN</button>

<div class="nav-block">
  <a href="index.html">
    <img src="triangulo.png" class="icono-logo">
  </a>
  <div class="nombre">
    <div>JOSÉ MARÍA RV</div>
    <div data-es="ARTISTA VISUAL" data-en="VISUAL ARTIST">ARTISTA VISUAL</div>
  </div>
  <nav class="menu-vertical">
    <div class="menu-item">
      <span class="menu-top" data-es="ARTE" data-en="ART">ARTE</span>
      <div class="submenu">
        <a href="comisiones.html" data-es="COMISIONES" data-en="COMMISSIONS">COMISIONES</a>
        <a href="proyectos.html" data-es="PROYECTOS" data-en="PROJECTS">PROYECTOS</a>
      </div>
    </div>
    <div class="menu-item">
      <span class="menu-top" data-es="SALÓN" data-en="SALON">SALÓN</span>
      <div class="submenu">
        <a href="notas-de-dibujo.html" data-es="NOTAS DE DIBUJO" data-en="DRAWING NOTES">NOTAS DE DIBUJO</a>
        <a href="resenas.html" data-es="RESEÑAS" data-en="REVIEWS">RESEÑAS</a>
      </div>
    </div>
    <div class="menu-item">
      <a class="menu-top" href="proyectos-anteriores.html" data-es="PROYECTOS ANTERIORES" data-en="PREVIOUS PROJECTS">PROYECTOS ANTERIORES</a>
    </div>
    <div class="menu-item">
      <a class="menu-top" href="bio.html" data-es="BIO" data-en="BIO">BIO</a>
    </div>
    <div class="menu-item">
      <a class="menu-top" href="contacto.html" data-es="CONTACTO" data-en="CONTACT">CONTACTO</a>
    </div>
  </nav>
</div>

<div class="sello-fijo">
  <a href="index.html">
    <img src="sello.png">
  </a>
</div>

<script>
  const translatable = document.querySelectorAll('[data-es][data-en]');
  const toggleBtn = document.getElementById('langToggle');

  function setLang(lang) {
    translatable.forEach(el => {
      el.textContent = el.getAttribute('data-' + lang);
    });
    toggleBtn.textContent = lang === 'es' ? 'EN' : 'ES';
    document.documentElement.lang = lang;
    localStorage.setItem('siteLang', lang);
  }

  const saved = localStorage.getItem('siteLang');
  const browserLang = navigator.language || navigator.userLanguage;
  const initialLang = saved || (browserLang.startsWith('es') ? 'es' : 'en');

  setLang(initialLang);

  toggleBtn.addEventListener('click', () => {
    const current = document.documentElement.lang;
    setLang(current === 'es' ? 'en' : 'es');
  });
</script>

</body>
</html>
