<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* FONDO GIF */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('estrellas.gif') no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    /* CAPA OSCURA (mejora legibilidad) */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.3);
      z-index: -1;
    }

    /* CONTENIDO */
    .barra {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* SELLO */
    .firma img {
      height: 40px;
      margin-bottom: 20px;
      filter: invert(1);
    }

    /* MENU SUPERIOR */
    .top-menu {
      display: flex;
      gap: 25px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .top-menu a {
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      color: white;
    }

    /* MENU PRINCIPAL */
    .menu {
      display: flex;
      gap: 60px;
    }

    .menu a {
      font-size: 11px;
      letter-spacing: 3px;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    /* HOVER */
    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <!-- FONDO -->
  <div class="background"></div>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENIDO -->
  <div class="barra">

    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="top-menu">
      <a href="#">BIO</a>
      <a href="#">CONTACTO</a>
      <a href="#">IG</a>
      <a href="#">YOUTUBE</a>
      <a href="mailto:tuemail@gmail.com">CORREO</a>
      <a href="https://wa.me/57XXXXXXXXXX">WHATSAPP</a>
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>ART PRACTICE</a>
      <a>APRESTO</a>
    </div>

  </div>

</body>
</html>
