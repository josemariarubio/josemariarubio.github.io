<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <style>
    body {
      margin: 0;
      background: white;
      height: 200vh;
      padding-top: 90px;
      font-family: Arial, sans-serif;
    }

    /* BARRA */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* MENÚ ARRIBA */
    .menu {
      display: flex;
      gap: 40px;
      margin-bottom: 8px;
    }

    .menu a {
      text-decoration: none;
      color: black;
      font-size: 10px; /* más pequeño */
      letter-spacing: 2px;
    }

    .menu a:hover {
      opacity: 0.5;
    }

    /* SELLO */
    .firma img {
      height: 40px; /* tamaño anterior */
      width: auto;
    }
  </style>
</head>

<body>

  <div class="barra">

    <div class="menu">
      <a href="#">XDXTXRXXL</a>
      <a href="#">LABORATORY</a>
      <a href="#">APRESTO</a>
      <a href="#">ARCHIVE</a>
    </div>

    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

  </div>

</body>
</html>
