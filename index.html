<<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* BARRA */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 8px;
    }

    .menu {
      display: flex;
      gap: 40px;
    }

    .menu a {
      text-decoration: none;
      color: black;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .menu a:hover {
      opacity: 0.5;
    }

    #canvas-container {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="barra">
    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="menu">
      <a href="#">XDXTXRXXL</a>
      <a href="#">LABORATORY</a>
      <a href="#">APRESTO</a>
      <a href="#">ARCHIVE</a>
    </div>
  </div>

  <div id="canvas-container"></div>

  <script>
    let stars = [];

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight - 80);
      canvas.parent("canvas-container");

      // estrellas
      for (let i = 0; i < 100; i++) {
        stars.push({
          x: random(width),
          y: random(height / 2),
          size: random(1, 2)
        });
      }
    }

    function draw() {
      background(255);

      stroke(0);
      noFill();

      drawSky();
      drawMountain();
      drawHouse();
    }

    // CIELO
    function drawSky() {
      strokeWeight(1);
      for (let s of stars) {
        point(s.x, s.y);
      }
    }

    // MONTAÑA
    function drawMountain() {
      let t = frameCount * 0.01;

      beginShape();
      for (let x = 0; x < width; x += 10) {
        let y = height * 0.5 + sin(x * 0.01 + t) * 40;
        vertex(x, y);
      }
      endShape();
    }

    // CASA
    function drawHouse() {
      let cx = width / 2;
      let cy = height * 0.65;

      strokeWeight(1);

      // base
      rectMode(CENTER);
      rect(cx, cy, 60, 40);

      // techo
      beginShape();
      vertex(cx - 30, cy - 20);
      vertex(cx, cy - 50);
      vertex(cx + 30, cy - 20);
      endShape(CLOSE);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight - 80);
    }
  </script>

</body>
</html>
