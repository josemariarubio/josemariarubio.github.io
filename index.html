<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 25px;
      filter: invert(1);
    }

    .top-menu {
      display: flex;
      gap: 25px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .top-menu a {
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      color: white;
    }

    .menu {
      display: flex;
      gap: 60px;
    }

    .menu a {
      font-size: 11px;
      letter-spacing: 3px;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div id="canvas-container"></div>

  <div class="barra">
    <div class="firma">
      <img src="sello.png">
    </div>

    <div class="top-menu">
      <a href="#">BIO</a>
      <a href="#">CONTACTO</a>
      <a href="#">IG</a>
      <a href="#">YOUTUBE</a>
      <a href="#">CORREO</a>
      <a href="#">WHATSAPP</a>
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>ART PRACTICE</a>
      <a>APRESTO</a>
    </div>
  </div>

  <script>
    let mode = "none";
    let glow = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent("canvas-container");

      setupMenu();
    }

    function draw() {
      clear();

      glow = lerp(glow, mode === "none" ? 0 : 1, 0.05);

      // izquierda
      drawDoor(width * 0.25, height * 0.6, mode === "xdx" ? glow : 0);

      // centro
      drawDoor(width * 0.5, height * 0.6, mode === "art" ? glow : 0);

      // derecha
      drawDoor(width * 0.75, height * 0.6, mode === "apresto" ? glow : 0);
    }

    function drawDoor(x, y, g) {
      if (g <= 0.01) return;

      let w = 120;
      let h = 220;

      stroke(255, 200 * g);
      noFill();
      rectMode(CENTER);
      rect(x, y, w, h);

      noStroke();
      fill(255, 60 * g);
      rect(x, y, w - 10, h - 10);
    }

    function setupMenu() {
      let links = document.querySelectorAll(".menu a");

      links[0].onmouseover = () => mode = "xdx";
      links[1].onmouseover = () => mode = "art";
      links[2].onmouseover = () => mode = "apresto";

      links.forEach(link => {
        link.onmouseout = () => mode = "none";
      });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>

</body>
</html>
