<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra-top {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .menu {
      display: flex;
      gap: 80px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .barra-bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .bottom-menu {
      display: flex;
      gap: 30px;
      margin-bottom: 15px;
    }

    .bottom-menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
    }

    .firma-bottom img {
      height: 40px;
      filter: invert(1);
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div id="canvas-container"></div>

<!-- SUPERIOR -->
<div class="barra-top">
  <div class="menu">
    <a>MUNMAN</a>
    <a>ART PRACTICE</a>
    <a>XDXTXRXXL</a>
  </div>
</div>

<!-- INFERIOR -->
<div class="barra-bottom">
  <div class="bottom-menu">
    <a>BIO</a>
    <a>CONTACT</a>
  </div>
  <div class="firma-bottom">
    <img src="sello.png">
  </div>
</div>

<script>
let mode = "none";
let t = 0;

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");

  setupMenu();
}

function draw() {
  clear();
  t += 0.02;

  if (mode === "munman") drawMunman();
  if (mode === "art") drawCartesian();
  if (mode === "xdx") drawRain();
}

/* ===== MUNMAN ===== */
function drawMunman() {
  stroke(255, 40);
  noFill();

  for (let y = 0; y < height; y += 25) {
    beginShape();
    for (let x = 0; x < width; x += 25) {
      let offset = sin(x * 0.03 + frameCount * 0.1) * 10;
      vertex(x, y + offset);
    }
    endShape();
  }
}

/* ===== ART PRACTICE ===== */
function drawCartesian() {
  stroke(255, 60);
  strokeWeight(1);

  let spacing = 40;

  for (let x = 0; x < width; x += spacing) {
    let offset = sin(t + x * 0.01) * 5;
    line(x, 0, x, height + offset);
  }

  for (let y = 0; y < height; y += spacing) {
    let offset = cos(t + y * 0.01) * 5;
    line(0, y, width, y + offset);
  }
}

/* ===== XDXTXRXXL ===== */
function drawRain() {
  stroke(255, 120);
  strokeWeight(1);

  let spacing = 10;

  for (let x = 0; x < width; x += spacing) {
    let offset = sin(t * 3 + x * 0.05) * 20;

    line(
      x,
      0 + offset,
      x,
      height + offset
    );
  }
}

/* ===== INTERACCIÓN ===== */
function setupMenu() {
  let links = document.querySelectorAll(".menu a");

  links[0].onmouseover = () => mode = "munman";
  links[1].onmouseover = () => mode = "art";
  links[2].onmouseover = () => mode = "xdx";

  links.forEach(link => {
    link.onmouseout = () => mode = "none";
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
