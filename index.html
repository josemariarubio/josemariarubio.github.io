<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* BARRA */
    .barra {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      z-index: 1000;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .firma img {
      height: 40px;
      margin-bottom: 8px;
    }

    .menu {
      display: flex;
      gap: 50px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      text-decoration: none;
      color: black;
      cursor: pointer;
    }

    .menu a:hover {
      opacity: 0.5;
    }

    #canvas-container {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
    }
  </style>
</head>

<body>

  <!-- BARRA -->
  <div class="barra">
    <div class="firma">
      <img src="sello.png" alt="firma">
    </div>

    <div class="menu">
      <a>XDXTXRXXL</a>
      <a>ART PRACTICE</a>
      <a>APRESTO</a>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-container"></div>

  <!-- SCRIPT -->
  <script>
    let mode = "default";
    let t = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight - 80);
      canvas.parent("canvas-container");
      setupMenu();
    }

    function draw() {
      background(255);
      stroke(0);
      noFill();
      strokeWeight(1);

      t += 0.02;

      // línea base
      drawLine();

      // estados
      if (mode === "shirt") drawShirtBody();
      if (mode === "dance") drawDancingBody();
      if (mode === "push") drawPushupBody();
    }

    /* ===== LÍNEA ===== */
    function drawLine() {
      beginShape();
      for (let x = 0; x < width; x += 10) {
        let y = height / 2 + sin(x * 0.01 + t) * 40;
        vertex(x, y);
      }
      endShape();
    }

    /* ===== CUERPO CAMISETA ===== */
    function drawShirtBody() {
      let cx = width / 2;
      let cy = height / 2;

      // torso
      line(cx, cy - 40, cx, cy + 40);

      // brazos abiertos
      line(cx, cy - 20, cx - 40, cy);
      line(cx, cy - 20, cx + 40, cy);

      // piernas
      line(cx, cy + 40, cx - 20, cy + 80);
      line(cx, cy + 40, cx + 20, cy + 80);

      // cabeza
      ellipse(cx, cy - 60, 20);

      // camiseta
      rectMode(CENTER);
      rect(cx, cy - 10, 60, 50);
    }

    /* ===== CUERPO BAILANDO ===== */
    function drawDancingBody() {
      let cx = width / 2;
      let cy = height / 2;

      let motion = sin(t * 2) * 20;

      // torso inclinado
      line(cx, cy - 40, cx + motion, cy + 40);

      // cabeza
      ellipse(cx, cy - 60, 20);

      // brazos
      line(cx, cy - 20, cx - 40, cy + motion);
      line(cx, cy - 20, cx + 40, cy - motion);

      // piernas
      line(cx + motion, cy + 40, cx - 20, cy + 80);
      line(cx + motion, cy + 40, cx + 20, cy + 80);
    }

    /* ===== FLEXIONES ===== */
    function drawPushupBody() {
      let cx = width / 2;
      let cy = height / 2;

      let motion = sin(t * 2) * 10;

      // cuerpo horizontal
      line(cx - 60, cy + motion, cx + 60, cy - motion);

      // cabeza
      ellipse(cx + 70, cy - motion, 15);

      // brazos
      line(cx + 40, cy, cx + 40, cy + 30 + motion);

      // piernas
      line(cx - 60, cy, cx - 80, cy + 30);
    }

    /* ===== INTERACCIÓN ===== */
    function setupMenu() {
      let links = document.querySelectorAll(".menu a");

      links[0].onmouseover = () => mode = "shirt";
      links[1].onmouseover = () => mode = "dance";
      links[2].onmouseover = () => mode = "push";

      links.forEach(link => {
        link.onmouseout = () => mode = "default";
      });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight - 80);
    }
  </script>

</body>
</html>
