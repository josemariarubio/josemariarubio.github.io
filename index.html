<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>José María Rubio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .barra-top {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .menu {
      display: flex;
      gap: 80px;
    }

    .menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .barra-bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .bottom-menu {
      display: flex;
      gap: 30px;
      margin-bottom: 15px;
    }

    .bottom-menu a {
      font-size: 10px;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
    }

    .firma-bottom img {
      height: 40px;
      filter: invert(1);
    }

    a:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div id="canvas-container"></div>

<!-- SUPERIOR -->
<div class="barra-top">
  <div class="menu">
    <a>MUNMAN</a>
    <a>ART</a>
    <a>XDXTXRXXL</a>
  </div>
</div>

<!-- INFERIOR -->
<div class="barra-bottom">
  <div class="bottom-menu">
    <a>BIO</a>
    <a>CONTACT</a>
  </div>
  <div class="firma-bottom">
    <img src="sello.png">
  </div>
</div>

<script>
let mode = "none";
let flash = 0;
let ray = 0;
let grid = 0;

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");

  setupMenu();
}

function draw() {
  clear();

  flash = lerp(flash, mode === "munman" ? 1 : 0, 0.1);
  ray = lerp(ray, mode === "xdx" ? 1 : 0, 0.2);
  grid = lerp(grid, mode === "art" ? 1 : 0, 0.05);

  drawMunman();
  drawRay();
  drawGrid();
}

/* ===== MUNMAN → DISTORSIÓN SUAVE ===== */
function drawMunman() {
  if (flash < 0.01) return;

  stroke(255, 40 * flash);
  noFill();

  for (let y = 0; y < height; y += 25) {
    beginShape();
    for (let x = 0; x < width; x += 25) {
      let offset = sin(x * 0.03 + frameCount * 0.1) * 10 * flash;
      vertex(x, y + offset);
    }
    endShape();
  }
}

/* ===== XDXTXRXXL → RAYO ===== */
function drawRay() {
  if (ray < 0.05) return;

  stroke(255, 200 * ray);
  strokeWeight(2);

  let x = random(width);

  line(x, 0, x + random(-20,20), height);

  // desaparece rápido
  ray *= 0.6;
}

/* ===== ART → RETÍCULA ===== */
function drawGrid() {
  if (grid < 0.01) return;

  stroke(255, 60 * grid);
  noFill();

  let spacing = 40;

  for (let i = -width; i < width; i += spacing) {
    line(width/2 + i, height, width/2 + i*0.3, height*0.3);
  }

  for (let j = 0; j < height; j += spacing) {
    line(0, j, width, j * 0.7);
  }
}

/* ===== INTERACCIÓN ===== */
function setupMenu() {
  let links = document.querySelectorAll(".menu a");

  links[0].onmouseover = () => mode = "munman";
  links[1].onmouseover = () => mode = "art";
  links[2].onmouseover = () => mode = "xdx";

  links.forEach(link => {
    link.onmouseout = () => mode = "none";
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
